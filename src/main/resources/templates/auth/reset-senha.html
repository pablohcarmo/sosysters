<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="icon" th:href="@{/images/icons/icon_sosysters.png}" type="image/x-icon"/>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <img class="img img_logo" th:src="@{/images/S.O 1.png}" alt="Logo SOSYSTERS">
    <h1 class="titulo">Recuperar Senha</h1>

    <div th:if="${message}" class="mensagem-flash" th:text="${message}"></div>

    <form th:action="@{/reset-senha}" method="post" class="form-login">
        <p class="login">Email cadastrado</p>
        <input class="campo_login" type="email" name="email" placeholder="Digite seu email" required autocomplete="email">

        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <button class="btn_entrar ancora" type="submit">Enviar Link de Reset</button>
    </form>

    <a class="btn_criar ancora" th:href="@{/login}" style="margin-top: 20px;">Voltar ao Login</a>
</div>

<script type="text/javascript" th:src="@{/scripts/main.js}"></script>
</body>
</html>
