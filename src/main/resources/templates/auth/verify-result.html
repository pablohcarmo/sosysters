<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de E-mail</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div style="max-width:600px;margin:80px auto;text-align:center;padding:20px;border:1px solid #ddd;border-radius:8px;">
        <h2>Confirmação de cadastro</h2>
        <p th:text="${message}">Sua conta foi confirmada com sucesso.</p>
        <button id="okBtn" style="padding:8px 16px;margin-top:16px;">OK</button>
        <p style="font-size:12px;color:#666;margin-top:12px;">Você será redirecionada(o) à tela de login em <span id="count">5</span> segundos.</p>
    </div>

    <script>
        document.getElementById('okBtn').addEventListener('click', function(){
            window.location.href = '/login';
        });
        // countdown and auto-redirect
        let seconds = 5;
        const span = document.getElementById('count');
        const interval = setInterval(() => {
            seconds--;
            span.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/login';
            }
        }, 1000);
    </script>
</body>
</html>
