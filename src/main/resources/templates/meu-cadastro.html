<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{components/layout}">

<head>
    <title>Meu Cadastro</title>
    <th:block layout:fragment="head">
        <link rel="stylesheet" th:href="@{/css/style-meu-cadastro.css}">
    </th:block>
</head>
<body>
<main layout:fragment="content">
    <section class="cadastro-page">
        <div class="cadastro-card">
            <h2 class="cadastro-title">Meu Cadastro</h2>

            <p class="cadastro-subtitle">Edite seus dados cadastrais e mantenha as informações atualizadas.</p>

            <div class="cadastro-feedback sucesso" th:if="${mensagem}" th:text="${mensagem}"></div>
            <div class="cadastro-feedback erro" th:if="${erro}" th:text="${erro}"></div>

            <form th:action="@{/meu-cadastro}" method="post" class="cadastro-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="nomeUsuaria">Nome</label>
                        <input type="text" id="nomeUsuaria" name="nomeUsuaria" th:value="${cadastro.nomeUsuaria}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="sobrenomeUsuaria">Sobrenome</label>
                        <input type="text" id="sobrenomeUsuaria" name="sobrenomeUsuaria" th:value="${cadastro.sobrenomeUsuaria}" required>
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="nomeSocialUsuaria">Nome social</label>
                        <input type="text" id="nomeSocialUsuaria" name="nomeSocialUsuaria" th:value="${cadastro.nomeSocialUsuaria}">
                    </div>
                    <div>
                        <label class="texto-form" for="dtNascimentoUsuaria">Data de nascimento</label>
                        <input type="date" id="dtNascimentoUsuaria" name="dtNascimentoUsuaria" th:value="${cadastro.dtNascimentoUsuaria}" required>
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="rgUsuaria">RG</label>
                        <input type="text" id="rgUsuaria" name="rgUsuaria" th:value="${cadastro.rgUsuaria}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="cpfUsuaria">CPF</label>
                        <input type="text" id="cpfUsuaria" name="cpfUsuaria" th:value="${cadastro.cpfUsuaria}" required maxlength="14" placeholder="000.000.000-00">
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="emailUsuaria">Email</label>
                        <input type="email" id="emailUsuaria" name="emailUsuaria" th:value="${cadastro.emailUsuaria}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="telefoneCompleto">Telefone</label>
                        <input type="text" id="telefoneCompleto" name="telefoneCompleto" th:value="${cadastro.telefoneCompleto}" placeholder="(11) 91234-5670" maxlength="15" required>
                    </div>
                </div>

                <div class="linha tres-colunas">
                    <div>
                        <label class="texto-form" for="cep">CEP</label>
                        <input type="text" id="cep" name="cep" th:value="${cadastro.cep}" required maxlength="8">
                    </div>
                    <div>
                        <label class="texto-form" for="numeroResidencia">Número</label>
                        <input type="text" id="numeroResidencia" name="numeroResidencia" th:value="${cadastro.numeroResidencia}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="complemento">Complemento</label>
                        <input type="text" id="complemento" name="complemento" th:value="${cadastro.complemento}">
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="logradouro">Rua</label>
                        <input type="text" id="logradouro" name="logradouro" th:value="${cadastro.logradouro}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="bairro">Bairro</label>
                        <input type="text" id="bairro" name="bairro" th:value="${cadastro.bairro}" required>
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" th:value="${cadastro.cidade}" required>
                    </div>
                    <div>
                        <label class="texto-form" for="estado">Estado</label>
                        <input type="text" id="estado" name="estado" th:value="${cadastro.estado}" required>
                    </div>
                </div>

                <div class="linha duas-colunas">
                    <div>
                        <label class="texto-form" for="etniaUsuaria">Etnia</label>
                        <select id="etniaUsuaria" name="etniaUsuaria" required>
                            <option value="">Selecione uma etnia</option>
                            <option th:each="e : ${etnias}"
                                    th:value="${e.idEtnia}"
                                    th:text="${e.etnia}"
                                    th:selected="${cadastro.etniaUsuaria != null and cadastro.etniaUsuaria == e.idEtnia}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="texto-form" for="generoUsuaria">Gênero</label>
                        <select id="generoUsuaria" name="generoUsuaria" required>
                            <option value="">Selecione um gênero</option>
                            <option th:each="g : ${generos}"
                                    th:value="${g.idGenero}"
                                    th:text="${g.genero}"
                                    th:selected="${cadastro.generoUsuaria != null and cadastro.generoUsuaria == g.idGenero}"></option>
                        </select>
                    </div>
                </div>

                <div class="acoes-form">
                    <button type="submit" class="btn btn-salvar">Salvar</button>
                    <a class="btn btn-cancelar" th:href="@{/perfil}">Cancelar</a>
                </div>
            </form>
        </div>
    </section>

    <script type="text/javascript" th:src="@{/scripts/meu-cadastro.js}"></script>
</main>
</body>
</html>
