<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{components/layout}">

<head>
    <title>Suporte</title>
    <th:block layout:fragment="head">
        <link rel="stylesheet" th:href="@{/css/style-suporte.css}">
    </th:block>
</head>

<body>
    <main layout:fragment="content">

    <div class="container">
        <h1 class="titulo">Suporte</h1>
        <p class="descricao">
            Está com problemas no aplicativo? Informe seu problema e descreva. 
            Entraremos em contato o mais rápido possível.
        </p>

        <div th:if="${message}" class="mensagem-flash" th:text="${message}"></div>

        <form th:action="@{/suporte}" method="POST" enctype="multipart/form-data">
            <label for="nome">Nome da Solicitação</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o título do problema..." required>

            <label for="descricao">Descrição da Solicitação</label>
            <textarea id="descricao" name="descricao" placeholder="Descreva seu problema..." required></textarea>

            <label for="foto">Anexar Imagem (opcional)</label>
            <input type="file" id="foto" name="foto" accept="image/*">

            <button type="submit" class="botao">Enviar Solicitação</button>
        </form>
    </div>

    </main>

</body>
</html>
