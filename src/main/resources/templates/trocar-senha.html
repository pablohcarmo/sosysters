<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{components/layout}">

<head>
    <title>Trocar senha</title>
    <th:block layout:fragment="head">
        <link rel="stylesheet" th:href="@{/css/style-perfil.css}">
    </th:block>
</head>
<body>
    <main layout:fragment="content">
        <section class="secao">
            <div class="perfil">
                <h2 class="nome-usuario">Trocar senha</h2>

                <form id="trocar-senha-form" novalidate>
                    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
                        <label style="width:90%;text-align:left;">Senha atual
                            <input type="password" id="currentPassword" name="currentPassword" required style="width:100%;padding:8px;border-radius:4px;border:1px solid #ccc;">
                        </label>

                        <label style="width:90%;text-align:left;">Nova senha
                            <input type="password" id="newPassword" name="newPassword" required minlength="8" style="width:100%;padding:8px;border-radius:4px;border:1px solid #ccc;">
                        </label>

                        <label style="width:90%;text-align:left;">Confirme a nova senha
                            <input type="password" id="confirmPassword" name="confirmPassword" required style="width:100%;padding:8px;border-radius:4px;border:1px solid #ccc;">
                        </label>
                    </div>

                    <div class="opcao" style="margin-top:12px;">
                        <a href="#" id="submit-change" class="">Trocar senha</a>
                    </div>

                    <p id="form-message" style="margin-top:10px;color:#b00020;font-weight:600;text-align:center;"></p>
                </form>
            </div>
        </section>

        <script type="text/javascript" th:src="@{/scripts/trocar-senha.js}"></script>
    </main>
</body>
</html>
